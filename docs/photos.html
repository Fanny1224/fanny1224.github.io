        .button1 {

            background-color: transparent; /* 设置背景为透明 */
            color: white; /* 设置文字颜色为白色 */
            border: 2px solid white; /* 设置方形边框 */
            border-radius: 0; /* 去掉圆角 */
            cursor: pointer; /* 鼠标悬停时显示手型光标 */
            margin: 0 10px; /* 设置按钮间间距为零 */
        }
        .button2 {
            padding: 10px 20px;
            font-size: 20px;
            background-color: rgba(255,255,255,0.5); /* 设置背景为透明 */

            border: 2px solid white; /* 设置方形边框 */
            border-radius: 0; /* 去掉圆角 */
            cursor: pointer; /* 鼠标悬停时显示手型光标 */
            margin: 0 10px; /* 设置按钮间间距为零 */
        }
        
        .container {
          display: flex;
          align-items: center;
          margin-right: 30px;
          margin-left: 30px;
        }
        
        .text {
          flex: 0 0 800px;
          text-align: left;
          font-size: 18px;
          line-height: 1.5;
        }
        
        .image {
          flex: 1；
          display: flex;
          justify-content: center;
        }
        
        img {
          width: 80%;
          height: auto;
          margin_top: 20px;
          margin-bottom: 0px;
          margin-left: 20px;
          margin-right: 20px;
        }

        .image .caption {
            margin-top: 0px;
            margin-botton: 20px;
            text-align: center;
            font-style: italic;
          }

        .left-align {
            text-align: left;
            margin-left: 30px;
          }

        /* ===== Gallery Layout ===== */
        .gallery {
            column-count: 4;           /* 控制列数 */
            column-gap: 15px;
            padding: 30px;
        }
        
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 15px;
            position: relative;
        }
        
        .gallery-item img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* hover 放大一点 */
        .gallery-item img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255,255,255,0.3);
        }
        
        /* 不规则旋转 */
        .rotate1 { transform: rotate(-2deg); }
        .rotate2 { transform: rotate(1.5deg); }
        .rotate3 { transform: rotate(-1deg); }
        .rotate4 { transform: rotate(2deg); }
        
        /* 不同大小（制造不规则感） */
        .small img { width: 90%; }
        .large img { width: 105%; }
        .tall img { aspect-ratio: 3/4; object-fit: cover; }
        .wide img { aspect-ratio: 4/3; object-fit: cover; }
        
        /* 响应式 */
        @media (max-width: 1000px) {
            .gallery { column-count: 3; }
        }
        @media (max-width: 600px) {
            .gallery { column-count: 2; }
        }
        

    </style>
